    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        @keyframes aurora-1 {
            0% {
                transform: translate(-20%, -20%) scale(1);
            }

            50% {
                transform: translate(20%, 10%) scale(1.2);
            }

            100% {
                transform: translate(-20%, -20%) scale(1);
            }
        }

        @keyframes aurora-2 {
            0% {
                transform: translate(30%, 30%) scale(1.1);
            }

            50% {
                transform: translate(-10%, -20%) scale(0.9);
            }

            100% {
                transform: translate(30%, 30%) scale(1.1);
            }
        }

        @keyframes aurora-3 {
            0% {
                transform: translate(-15%, 40%) scale(0.8);
            }

            50% {
                transform: translate(40%, -10%) scale(1.3);
            }

            100% {
                transform: translate(-15%, 40%) scale(0.8);
            }
        }

        .aurora-blob {
            filter: blur(80px);
            opacity: 0.5;
            mix-blend-mode: soft-light;
            position: absolute;
            border-radius: 100%;
        }

        .dark .aurora-blob {
            mix-blend-mode: screen;
            opacity: 0.3;
        }
    </style>
